<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BS Calendar</title>
<link rel="stylesheet" href="calendar.css">
</head>
<body>

<header>
    <img src="assets/Taskify.png" alt="Taskify Logo">
    <h1>BS Calendar</h1>
    <h2 id="bs-month"></h2>
</header>

<div class="calendar-container">
    <div class="calendar-weekdays"></div>
    <div class="calendar-grid" id="calendar-grid"></div>
    <h3>Events:</h3>
    <div class="event-list" id="event-list"></div>
</div>

<footer>&copy; 2025 Taskify</footer>

<!-- Nepali date converter -->
<script src="https://cdn.jsdelivr.net/npm/nepali-date-converter@1.0.2/nepali-date-converter.min.js"></script>
<script src="bs-calendar.js"></script>
</body>
</html>
