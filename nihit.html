<!DOCTYPE html>
<html>
<body>
    <h2>Forms  Lab</h2>
    
    <!-- 1. Form Validation -->
    <form onsubmit="return validate()">
        <input id="name" placeholder="Name">
        <span id="nameErr" style="color:red"></span><br>
        
        <input id="email" placeholder="Email">
        <span id="emailErr" style="color:red"></span><br>
        
        <button>Submit</button>
    </form>
    
    <!-- 2. Dynamic Fields -->
    <button onclick="add()">+ Add Field</button>
    <div id="fields"></div>
    <button onclick="show()">Show Data</button>
    <div id="output"></div>

    <script>
        // 1. Validation
        function validate() {
            let valid = true;
            
            if(!document.getElementById('name').value) {
                document.getElementById('nameErr').innerText = 'Name required';
                valid = false;
            }
            
            if(!document.getElementById('email').value.includes('@')) {
                document.getElementById('emailErr').innerText = 'Invalid email';
                valid = false;
            }
            
            if(valid) alert('Form valid!');
            return false; // Prevent actual submission
        }
        
        // 2. Dynamic Fields
        let count = 0;
        function add() {
            count++;
            const div = document.createElement('div');
            div.innerHTML = `
                <input placeholder="Field ${count}">
                <button onclick="this.parentElement.remove()">×</button>
            `;
            document.getElementById('fields').appendChild(div);
        }
        
        function show() {
            const data = [...document.querySelectorAll('#fields input')].map((inp,i) => 
                `Field ${i+1}: ${inp.value}`).join('<br>');
            document.getElementById('output').innerHTML = data || 'No data';
        }
        
        // Clear errors on input
        document.getElementById('name').oninput = () => 
            document.getElementById('nameErr').innerText = '';
        document.getElementById('email').oninput = () => 
            document.getElementById('emailErr').innerText = '';
    </script>
</body>
</html>
